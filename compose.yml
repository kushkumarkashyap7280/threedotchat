services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"        # Maps host port 8080 to container port 80 (Great for local Linux dev!)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-network  # Mandatory: connects Nginx to your internal microservices bridge

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
      
networks:
  backend-network:
    driver: bridge
